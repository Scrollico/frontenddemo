<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Business Suite</title>
  <link rel="icon" type="image/jpeg" href="/images/favicon.jpeg">
  <meta name="description"
    content="The Next-Generation Executive Intelligence Engine. Real-time market signals, predictive analytics, and competitor radar." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://github.com/Scrollico/frontenddemo" />
  <meta property="og:title" content="AI Business Suite - Executive Intelligence" />
  <meta property="og:description"
    content="The Next-Generation Executive Intelligence Engine. Real-time market signals, predictive analytics, and competitor radar." />
  <meta property="og:image" content="/images/373shots_so.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://github.com/Scrollico/frontenddemo" />
  <meta property="twitter:title" content="AI Business Suite - Executive Intelligence" />
  <meta property="twitter:description"
    content="The Next-Generation Executive Intelligence Engine. Real-time market signals, predictive analytics, and competitor radar." />
  <meta property="twitter:image" content="/images/373shots_so.png" />
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Dark Mode Scrollbar Thumb */
    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Light Mode Scrollbar Thumb */
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    body {
      font-family: 'Inter', sans-serif;
      /* Default to light mode bg */
      background-color: #F5F5F7;
      overflow: hidden;
    }

    /* Dark mode override - Executive Dark Mode Alignment */
    .dark body {
      background-color: #0F172A;
      /* Deep slate baseline */
      background-image: radial-gradient(circle at 50% -20%, #1E293B, #0F172A);
      color: #F8FAFC;
    }

    /* Enhanced Glass Panel - Executive Variant */
    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.2);
    }

    .glass-panel-light {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.05);
    }

    /* Apple-style smooth rounding utilities */
    .rounded-executive {
      border-radius: 14px;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fade-in 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* ... existing animations ... */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .animate-float {
      animation: float 5s ease-in-out infinite;
    }

    @keyframes pulse-soft {

      0%,
      100% {
        opacity: 0.1;
        transform: scale(1);
      }

      50% {
        opacity: 0.15;
        transform: scale(1.02);
      }
    }

    .animate-pulse-soft {
      animation: pulse-soft 4s ease-in-out infinite;
    }

    @keyframes icon-breathe {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.04);
      }
    }

    .animate-icon-breathe {
      animation: icon-breathe 2.5s ease-in-out infinite;
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin-slow {
      animation: spin-slow 20s linear infinite;
    }

    @keyframes spin-slow-reverse {
      from {
        transform: rotate(360deg);
      }

      to {
        transform: rotate(0deg);
      }
    }

    .animate-spin-slow-reverse {
      animation: spin-slow-reverse 25s linear infinite;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            executive: {
              DEFAULT: '#0F172A',
              card: '#1E293B',
              border: 'rgba(255, 255, 255, 0.08)',
            },
            iosBlue: '#007AFF',
            iosGlow: 'rgba(0, 122, 255, 0.3)',
          },
          borderRadius: {
            'xl': '12px',
            '2xl': '16px', // Reduced from default 24px style if needed
            '3xl': '24px',
          },
          fontFamily: {
            sans: ['Inter', 'apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          transitionTimingFunction: {
            'smooth': 'cubic-bezier(0.2, 0.8, 0.2, 1)',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
